<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
	<title>3D Music Visualizer</title>
	<link rel="stylesheet" href="/src/style.css" />
</head>

<body>
	<div id="app">
		<canvas id="visualizer"></canvas>

    

		<div class="ui-overlay">
			<header>
				<h1>Sonic Spectrum 3D</h1>
				<p>Immersive Audio Visualizer</p>
			</header>

			<div class="controls" id="controls-panel">
				<div class="control-group">
					<label for="audio-upload" class="button primary">
						<span>Choose Audio</span>
						<input type="file" id="audio-upload" accept="audio/*" hidden />
					</label>
				</div>

				<div class="control-group">
					<label for="color-picker">Color</label>
					<input type="color" id="color-picker" value="#00ffcc" />
				</div>

				<div class="control-group">
					<label for="volume-control">Volume</label>
					<input type="range" id="volume-control" min="0" max="1" step="0.01" value="0.5" />
				</div>

				<button id="minimize-btn" class="icon-button" title="Minimize">
					<svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2">
						<path d="M18 15l-6-6-6 6" />
					</svg>
				</button>
			</div>

			<div class="status" id="status-text">Select a track to begin...</div>
		</div>
	</div>
	<script type="module" src="/src/main.ts"></script>
</body>

</html>
